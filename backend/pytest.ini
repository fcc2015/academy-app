[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

asyncio_mode = auto

addopts =
    -v
    --strict-markers
    --tb=short
    --disable-warnings

markers =
    unit: fast unit tests with mocks (no network)
    integration: tests that require a live Supabase test project
    security: tests verifying authorization / isolation rules
    slow: tests that take more than 1 second
