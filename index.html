<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/icons/icon-96x96.png" />
    <link rel="apple-touch-icon" href="/icons/icon-192x192.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#4f46e5" />
    <meta name="description" content="Football Academy Management Platform - إدارة أكاديمية كرة القدم" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Football Academy" />
    <link rel="manifest" href="/manifest.json" />
    <title>Football Academy</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Cairo:wght@300;400;500;600;700;800;900&family=Noto+Sans+Arabic:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  </head>
  <body>
    <div id="root"></div>
    <script>
      // AUTO-HEAL: unregister stale SW + clear old caches once per session
      (function () {
        try {
          if (sessionStorage.getItem('sw_auto_cleaned')) return;
          sessionStorage.setItem('sw_auto_cleaned', '1');
          if ('serviceWorker' in navigator) {
            navigator.serviceWorker.getRegistrations().then(function (regs) {
              var hadOld = false;
              regs.forEach(function (r) {
                if (r.active && /v1|v2|v3/.test(r.active.scriptURL || '')) { r.unregister(); hadOld = true; }
              });
              if ('caches' in window) {
                caches.keys().then(function (names) {
                  var stale = names.filter(function (n) { return /dbadmin-academy-v[123]$/.test(n); });
                  Promise.all(stale.map(function (n) { return caches.delete(n); })).then(function () {
                    if (hadOld || stale.length > 0) location.reload();
                  });
                });
              }
            }).catch(function () {});
          }
        } catch (e) {}
      })();

      // GLOBAL ERROR HANDLER — dumps errors visibly so we can diagnose without DevTools
      (function () {
        var logs = [];
        function pushLog(kind, msg, stack) {
          logs.push({ kind: kind, msg: String(msg || ''), stack: String(stack || '') });
          try { window.__ERRORS__ = logs; } catch (e) {}
          render();
        }
        function render() {
          var el = document.getElementById('__err_banner__');
          if (!el) {
            el = document.createElement('div');
            el.id = '__err_banner__';
            el.style.cssText = 'position:fixed;bottom:0;left:0;right:0;z-index:2147483647;background:#7f1d1d;color:#fff;font:12px/1.5 monospace;max-height:40vh;overflow:auto;padding:8px 12px;border-top:3px solid #fca5a5;white-space:pre-wrap;direction:ltr;text-align:left;';
            document.body && document.body.appendChild(el);
          }
          el.textContent = 'ERRORS (' + logs.length + '):\n' + logs.map(function (l, i) {
            return '[' + (i + 1) + '][' + l.kind + '] ' + l.msg + (l.stack ? '\n' + l.stack : '');
          }).join('\n\n');
        }
        window.addEventListener('error', function (e) {
          pushLog('error', e.message + ' @ ' + (e.filename || '') + ':' + (e.lineno || ''), e.error && e.error.stack);
        });
        window.addEventListener('unhandledrejection', function (e) {
          var r = e.reason || {};
          pushLog('promise', r.message || r, r.stack);
        });
      })();
    </script>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', function () {
          navigator.serviceWorker.register('/sw.js').catch(function () {});
        });
      }
    </script>
  </body>
</html>
