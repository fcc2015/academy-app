name: Backend Tests

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - '.github/workflows/backend-tests.yml'
  pull_request:
    paths:
      - 'backend/**'
      - '.github/workflows/backend-tests.yml'

# Cancel superseded runs on the same ref to save Actions minutes
concurrency:
  group: backend-tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: pytest (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    timeout-minutes: 10

    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.12', '3.13']

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'
          cache-dependency-path: backend/requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run tests with coverage
        env:
          # Test env vars — never put real secrets in CI for unit tests
          SUPABASE_URL: https://test-project.supabase.co
          SUPABASE_KEY: test-anon-key
          SUPABASE_SERVICE_ROLE_KEY: test-service-role-key
          DEV_MODE: 'true'
          PAYPAL_CLIENT_ID: test-paypal-client
          PAYPAL_CLIENT_SECRET: test-paypal-secret
          PAYPAL_SANDBOX: 'true'
        run: |
          pytest tests/ \
            --cov=routers --cov=services --cov=core \
            --cov-report=term \
            --cov-report=xml \
            --junitxml=junit.xml

      - name: Upload coverage report
        if: always() && matrix.python-version == '3.13'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: backend/coverage.xml
          retention-days: 7

      - name: Upload junit report
        if: always() && matrix.python-version == '3.13'
        uses: actions/upload-artifact@v4
        with:
          name: junit-report
          path: backend/junit.xml
          retention-days: 7

      - name: Coverage summary
        if: matrix.python-version == '3.13'
        run: |
          echo "## Coverage Report" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          python -c "import xml.etree.ElementTree as ET; \
            t = ET.parse('coverage.xml').getroot(); \
            print(f'Line rate: {float(t.attrib[\"line-rate\"]) * 100:.1f}%'); \
            print(f'Lines covered: {t.attrib[\"lines-covered\"]} / {t.attrib[\"lines-valid\"]}')" \
            >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
