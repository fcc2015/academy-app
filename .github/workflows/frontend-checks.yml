name: Frontend Checks

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'public/**'
      - 'index.html'
      - 'package.json'
      - 'package-lock.json'
      - 'vite.config.js'
      - 'eslint.config.js'
      - 'tailwind.config.js'
      - 'postcss.config.js'
      - '.github/workflows/frontend-checks.yml'
  pull_request:
    paths:
      - 'src/**'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/frontend-checks.yml'

concurrency:
  group: frontend-checks-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-build:
    name: Lint & Build
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test:run

      - name: Build
        env:
          # Provide placeholder values so vite.config.js doesn't crash on missing env
          VITE_SUPABASE_URL: https://placeholder.supabase.co
          VITE_SUPABASE_ANON_KEY: placeholder-anon-key
          VITE_API_URL: https://placeholder-api.example.com
        run: npm run build

      - name: Upload build artifact
        if: success()
        uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist
          retention-days: 3
